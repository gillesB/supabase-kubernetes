{{- if and .Values.db.enabled .Values.db.enableCNPG .Values.db.backup.enabled -}}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "supabase.db.clusterName" . }}-scheduled
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.db.backup.schedule | default "0 0 2 * * *" | quote }}
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: {{ .Values.db.backup.pluginName | default "barman-cloud.cloudnative-pg.io" }}
  cluster:
    name: {{ include "supabase.db.clusterName" . }}
{{- end }}
