{{- if and .Values.db.enabled (or (not .Values.db.disableSupabaseMigrations) .Values.db.migrations.customConfigMap) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrations
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.db.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT"; do
                echo "Waiting for database..."
                sleep 5
              done
              echo "Database is ready!"
          env:
            - name: PGHOST
              value: {{ include "supabase.db.host" . }}
            - name: PGPORT
              value: "5432"
      containers:
        - name: migrations
          image: {{ .Values.db.image.repository }}:{{ .Values.db.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.db.image.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "/scripts/run-migrations.sh"]
          env:
            - name: PGHOST
              value: {{ include "supabase.db.host" . }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.username | default "username" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.password | default "password" }}
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.database | default "database" }}
            {{- with .Values.db.migrations.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: migration-runner
              mountPath: /scripts
            {{- if .Values.db.migrations.customConfigMap }}
            - name: custom-migrations
              mountPath: /custom-migrations
            {{- end }}
            {{- with .Values.db.migrations.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.db.migrations.resources | nindent 12 }}
      volumes:
        - name: migration-runner
          configMap:
            name: {{ .Release.Name }}-migrations-runner
            defaultMode: 0755
        {{- if .Values.db.migrations.customConfigMap }}
        - name: custom-migrations
          configMap:
            name: {{ .Values.db.migrations.customConfigMap }}
        {{- end }}
        {{- with .Values.db.migrations.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.db.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.db.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
