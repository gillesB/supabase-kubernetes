{{- if and .Values.db.enabled (or (not .Values.db.disableSupabaseMigrations) .Values.db.migrations.customConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-migrations-runner
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
data:
  run-migrations.sh: |
    #!/bin/sh
    set -eu

    DB_URL="postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"

    echo "=== Supabase Migration Runner ==="

    {{- if not .Values.db.disableSupabaseMigrations }}
    MIGRATIONS_DIR="/docker-entrypoint-initdb.d/migrations"

    # Pre-mark CNPG-incompatible migrations so dbmate skips them.
    # 10000000000000_demote-postgres.sql strips SUPERUSER from postgres — CNPG requires it
    # for streaming replication, backup, and reconciliation.
    psql -v ON_ERROR_STOP=1 --no-password --no-psqlrc -U "$PGUSER" -c "
      CREATE TABLE IF NOT EXISTS public.schema_migrations (version varchar(128) PRIMARY KEY);
      INSERT INTO public.schema_migrations (version) VALUES ('10000000000000') ON CONFLICT DO NOTHING;"

    echo "Running Supabase migrations via dbmate..."
    DBMATE_MIGRATIONS_DIR="$MIGRATIONS_DIR" DATABASE_URL="$DB_URL" dbmate --no-dump-schema migrate
    echo "Supabase migrations complete."
    {{- end }}

    {{- if .Values.db.migrations.customConfigMap }}
    # Run custom migrations with manual tracking (user SQL may not be dbmate-formatted)
    echo "Running custom migrations from /custom-migrations/..."
    psql -v ON_ERROR_STOP=1 --no-password --no-psqlrc -U "$PGUSER" -c "
      CREATE TABLE IF NOT EXISTS public._helm_migrations (
        version text PRIMARY KEY,
        applied_at timestamptz DEFAULT now()
      );"
    for sql in $(ls /custom-migrations/*.sql 2>/dev/null | sort); do
      version=$(basename "$sql" .sql)
      applied=$(psql -t -A --no-password --no-psqlrc -U "$PGUSER" -c "
        SELECT 1 FROM public._helm_migrations WHERE version = '$version'")
      if [ "$applied" = "1" ]; then
        echo "  Skipping (already applied): $version"
      else
        echo "  Applying: $version"
        psql -v ON_ERROR_STOP=1 --no-password --no-psqlrc -U "$PGUSER" -f "$sql"
        psql --no-password --no-psqlrc -U "$PGUSER" -c "
          INSERT INTO public._helm_migrations (version) VALUES ('$version');"
      fi
    done
    echo "Custom migrations complete."
    {{- end }}

    echo "=== All migrations done! ==="
{{- end }}
