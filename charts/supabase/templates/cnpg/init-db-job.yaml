{{- if .Values.db.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init-db
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "supabase.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: init-db
          image: {{ .Values.db.initJob.image | default "postgres:15-alpine" }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: {{ include "supabase.db.host" . }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.username | default "username" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.password | default "password" }}
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.db" . }}
                  key: {{ .Values.secret.db.secretRefKey.database | default "database" }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "supabase.secret.jwt" . }}
                  key: secret
            - name: JWT_EXP
              value: {{ .Values.db.environment.JWT_EXP | default 3600 | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Initializing Supabase database..."

              # JWT Configuration
              echo "Configuring JWT settings..."
              psql <<EOF
              ALTER DATABASE ${PGDATABASE} SET "app.settings.jwt_secret" TO '${JWT_SECRET}';
              ALTER DATABASE ${PGDATABASE} SET "app.settings.jwt_exp" TO '${JWT_EXP}';
              EOF

              echo "JWT configuration complete."

              # Execute webhook setup from ConfigMap
              echo "Setting up webhooks and functions..."
              psql -f /scripts/webhooks-setup.sql

              echo "Database initialization complete!"
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.db.initJob.resources | nindent 12 }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "supabase.initdb.configmap" . }}
      {{- with .Values.db.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.db.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
