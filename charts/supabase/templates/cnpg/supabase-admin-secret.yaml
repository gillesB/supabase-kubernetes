apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-supabase-admin
  labels:
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
data:
  username: {{ .Values.secret.db.username | b64enc }}
  password: {{ .Values.secret.db.password | b64enc }}
  database: {{ .Values.secret.db.database | b64enc }}
