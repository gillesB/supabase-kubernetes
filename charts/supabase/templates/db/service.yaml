{{- if and .Values.db.enabled .Values.db.enableLegacy -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "supabase.db.fullname" . }}
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.db.legacy.service.type }}
  {{- if .Values.db.legacy.service.loadBalancerIp }}
  loadBalancerIP: {{ .Values.db.legacy.service.loadBalancerIp }}
  {{- end }}
  ports:
    - port: {{ .Values.db.legacy.service.port }}
      targetPort: 5432
      protocol: TCP
      name: http
  selector:
    {{- include "supabase.db.selectorLabels" . | nindent 4 }}
{{- end }}