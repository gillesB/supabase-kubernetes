{{- if and .Values.db.enabled (not .Values.db.cloudnativepg.enabled) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "supabase.db.fullname" . }}-headless
  labels:
    {{- include "supabase.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
    - port: 9999
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "supabase.db.selectorLabels" . | nindent 4 }}
  publishNotReadyAddresses: true  # Allow DNS records for pods not yet ready
{{- end }}
